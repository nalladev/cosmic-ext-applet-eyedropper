name: release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ github.token }}
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            target_rustflags: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            target_rustflags: ""
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y libxkbcommon-dev libwayland-dev libdbus-1-dev libpulse-dev libpipewire-0.3-dev libinput-dev
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.15.0
      - name: Install packaging plugins
        run: |
          cargo binstall just
          cargo binstall cargo-deb
          cargo binstall cargo-generate-rpm
      - name: Build packages
        id: package
        run: |
          just build-release
          just build-deb
          just build-rpm

          NAME="cosmic-ext-applet-eyedropper"
          ARCH=`uname -m`

          mkdir ./$NAME
          cp ./target/release/$NAME ./resources/*.desktop ./resources/*.metainfo.xml ./resources/*.svg ./resources/install.sh  ./$NAME/
          strip -s ./$NAME/$NAME
          tar -czvf $NAME-$ARCH.tar.gz $NAME

          cp ./target/debian/*.deb ./
          cp ./target/generate-rpm/*.rpm ./

          echo $ARCH=./*.tar.gz >> $GITHUB_OUTPUT
          echo $ARCH-deb=./*.deb >> $GITHUB_OUTPUT
          echo $ARCH-rpm=./*.rpm >> $GITHUB_OUTPUT
      - name: Create release (if not exists)
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" --title "$TAG" --notes-from-tag || true
      - name: Upload release assets
        run: |
          TAG="${{ github.ref_name }}"
          gh release upload "$TAG" \
            ${{ steps.package.outputs.x86_64 }} \
            ${{ steps.package.outputs.aarch64 }} \
            ${{ steps.package.outputs.x86_64-deb }} \
            ${{ steps.package.outputs.aarch64-deb }} \
            ${{ steps.package.outputs.x86_64-rpm }} \
            ${{ steps.package.outputs.aarch64-rpm }} \
            --clobber
  checksum:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download Release Archives
        run: >-
          gh release download
          ${{ github.ref_name }}
          --repo ${{ github.repository }}
          --pattern '*'
          --dir release
      - name: Create Checksums
        run: |
          cd release
          shasum -a 256 * > ../SHA256SUMS
      - name: Upload Checksums
        run: |
          gh release upload "${{ github.ref_name }}" SHA256SUMS --clobber --repo ${{ github.repository }}
