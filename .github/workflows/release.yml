name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Native Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo-deb cargo-generate-rpm libpipewire-0.3-dev

      - name: Build release
        run: cargo build --release

      - name: Build .deb
        run: cargo deb

      - name: Build .rpm
        run: cargo generate-rpm

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            target/release/cosmic-ext-applet-eyedropper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}